<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Atmospheric — A real-time weather application with immersive visual design" />
  <title>Atmospheric</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/styles.css">
</head>

<body>

  <!-- ====== MAIN APP CONTAINER ====== -->
  <main class="app-container" id="appContainer">
    <!-- Navigation -->
    <nav class="nav-bar" aria-label="Main navigation">
      <div class="nav-brand">
        <span class="nav-brand-dot" aria-hidden="true"></span>
        Atmospheric
      </div>
      <div class="nav-controls">
        <div class="search-wrapper">
          <input type="text" class="search-input" id="searchInput" placeholder="Search city..."
            aria-label="Search for a city" autocomplete="off">
          <button class="search-btn" id="searchBtn" aria-label="Search">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <circle cx="11" cy="11" r="8" />
              <line x1="21" y1="21" x2="16.65" y2="16.65" />
            </svg>
          </button>
        </div>
        <div class="unit-toggle" role="radiogroup" aria-label="Temperature unit">
          <button class="unit-btn active" data-unit="metric" role="radio" aria-checked="true">°C</button>
          <button class="unit-btn" data-unit="imperial" role="radio" aria-checked="false">°F</button>
        </div>
        <button class="location-btn" id="locationBtn" aria-label="Use my current location">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <circle cx="12" cy="12" r="3" />
            <path d="M12 2v4m0 12v4M2 12h4m12 0h4" />
          </svg>
          My Location
        </button>
      </div>
    </nav>

  </main>
  
  <script src="assets/js/main.js"></script>

</body>

</html>
